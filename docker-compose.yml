services:
  backend:
    build: .
    container_name: primetradeai-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm start

  mongodb:
    image: mongo:7
    container_name: primetradeai-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7
    container_name: primetradeai-redis
    ports:
      - "6379:6379"

volumes:
  mongo_data:
